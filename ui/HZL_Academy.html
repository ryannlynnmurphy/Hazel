let state={view:"catalog",enrolling:null,selAc:0,selLi:0,acs:[],prog:{},xp:0,search:"",catF:null,showSet:false,delC:null,showCust:false,gLoad:false,gErr:null};

// Initialize from localStorage (fresh start)
(function(){
    try {
        const savedAcs = localStorage.getItem("hzl_a");
        const savedProg = localStorage.getItem("hzl_pr");
        const savedXp = localStorage.getItem("hzl_xp");
        if(savedAcs) state.acs = JSON.parse(savedAcs);
        if(savedProg) state.prog = JSON.parse(savedProg);
        if(savedXp) state.xp = parseInt(savedXp);
    } catch(e) {
        console.log("Starting fresh");
        localStorage.clear();
    }
})();

function setState(updates){state={...state,...updates};render()}
function addXp(n){const newXp=state.xp+n;localStorage.setItem("hzl_xp",newXp);setState({xp:newXp})}
function toggle(id){const newProg={...state.prog,[id]:!state.prog[id]};localStorage.setItem("hzl_pr",JSON.stringify(newProg));setState({prog:newProg})}
function enroll(subj){setState({enrolling:subj});setTimeout(()=>{const lessons=subj.lessons.map((l,i)=>({id:`${subj.id}_${i}`,t:l.t,d:l.d}));const newAc={id:`ac_${Date.now()}`,...subj,lessons};const newAcs=[...state.acs,newAc];localStorage.setItem("hzl_a",JSON.stringify(newAcs));addXp(500);setState({acs:newAcs,enrolling:null,view:"my",selAc:newAcs.length-1})},2000)}
function delAc(idx){const newAcs=state.acs.filter((_,i)=>i!==idx);localStorage.setItem("hzl_a",JSON.stringify(newAcs));setState({acs:newAcs,delC:null,view:"my"})}

function Modal(content,onClose){return `<div class="modal-overlay" onclick="${onClose?`if(event.target===this){${onClose}()}`:''}"><div class="modal-content" onclick="event.stopPropagation()">${content}</div></div>`}

function SubjectCard(subj,delay){const done=state.acs.some(a=>a.title===subj.title&&a.tag===subj.tag);return `<div onclick='window.enrollSubject(${JSON.stringify(subj).replace(/'/g,"\\'")})'style="background:${T.fg};border:1px solid ${T.bd};border-radius:${T.r}px;padding:18px 20px;cursor:pointer;box-shadow:${T.sh};animation:fadeIn .3s ease ${delay}s both"><div style="display:flex;justify-content:space-between;margin-bottom:6px"><span style="font-size:9px;font-weight:700;letter-spacing:1.5px;color:${T.txM};font-family:${T.fs}">${subj.tag}</span>${done?`<span style="color:${T.acc};font-size:11px;font-weight:600">ENROLLED</span>`:''}</div><h3 style="font-family:${T.ff};font-size:17px;font-weight:500;color:${T.tx};margin-bottom:4px">${subj.title}</h3><p style="font-size:12px;color:${T.tx2};font-family:${T.fs};line-height:1.4;margin-bottom:10px">${subj.desc}</p><p style="font-size:11px;color:${T.txM};font-family:${T.fs}">${subj.lessons.length} lessons</p></div>`}

function ProgressBar(done,total){const pct=total===0?0:(done/total)*100;return `<div style="background:${T.fg2};border-radius:20px;height:8px;overflow:hidden"><div style="background:${T.acc};height:100%;width:${pct}%;transition:width .3s ease;border-radius:20px"></div></div>`}

function Badge(status){const colors={not_started:{bg:T.fg2,tx:T.txM,label:"Not Started"},in_progress:{bg:"#dbeafe",tx:"#1e40af",label:"In Progress"},completed:{bg:"#dcfce7",tx:"#15803d",label:"Completed"}};const c=colors[status]||colors.not_started;return `<span style="font-size:9px;font-weight:700;letter-spacing:1px;color:${c.tx};background:${c.bg};padding:4px 8px;border-radius:4px">${c.label}</span>`}

function render(){
const sel=state.selAc!==null?state.acs[state.selAc]:null;
const tD=state.acs.reduce((s,a)=>s+a.lessons.filter(l=>state.prog[l.id]).length,0);

let html='';
if(state.delC!==null&&state.acs[state.delC]){

}

html+=`<div style="min-height:100vh;background:${T.bg};font-family:${T.fs}"><div style="position:fixed;top:0;left:0;right:0;z-index:50;background:${T.bg}E6;backdrop-filter:blur(8px);border-bottom:1px solid ${T.bdL};padding:0 20px"><div style="max-width:960px;margin:0 auto;height:52px;display:flex;align-items:center;justify-content:space-between"><div style="display:flex;align-items:center;gap:16px"><h1 onclick="setState({enrolling:null,view:'catalog'})"style="font-family:${T.ff};font-size:20px;font-weight:500;color:${T.tx};cursor:pointer">HZL Academy</h1><div style="display:flex;gap:2px"><button onclick="setState({enrolling:null,view:'catalog'})"style="padding:6px 12px;font-size:12px;font-weight:${state.view==='catalog'&&!state.enrolling?700:500};font-family:${T.fs};color:${state.view==='catalog'&&!state.enrolling?T.acc:T.tx2};border-bottom:${state.view==='catalog'&&!state.enrolling?`2px solid ${T.acc}`:'2px solid transparent'}">${icons.db(13)} Catalog</button><button onclick="setState({enrolling:null,view:'my'})"style="padding:6px 12px;font-size:12px;font-weight:${['my','detail','lesson'].includes(state.view)&&!state.enrolling?700:500};font-family:${T.fs};color:${['my','detail','lesson'].includes(state.view)&&!state.enrolling?T.acc:T.tx2};border-bottom:${['my','detail','lesson'].includes(state.view)&&!state.enrolling?`2px solid ${T.acc}`:'2px solid transparent'}">${icons.book(13)} My Academies${state.acs.length>0?` (${state.acs.length})`:''}</button></div></div><div style="display:flex;align-items:center;gap:10px"><div style="display:flex;align-items:center;gap:5px;color:${T.gold}">${icons.star(12)}<span style="font-size:12px;font-weight:700;font-family:${T.fs}">${state.xp} XP</span></div></div></div></div><main style="max-width:960px;margin:0 auto;padding:68px 20px 60px">`;

html+=`<div style="animation:fadeIn .3s ease"><div style="text-align:center;margin-bottom:24px"><h2 style="font-family:${T.ff};font-size:clamp(24px,4vw,34px);font-weight:400;color:${T.tx};margin-bottom:6px">Subject Catalog</h2><p style="font-size:14px;color:${T.tx2};font-family:${T.fs}">${TOTAL_S} subjects. ${TOTAL_L}+ lessons. All Creative Commons.</p></div><div style="position:relative;max-width:400px;margin:0 auto 20px"><span style="position:absolute;left:12px;top:50%;transform:translateY(-50%);color:${T.txM}">${icons.search()}</span><input id="searchInput"value="${state.search}"placeholder="Search subjects..."style="width:100%;padding:11px 14px 11px 38px;font-size:14px;font-family:${T.fs};border:1.5px solid ${T.bd};border-radius:${T.rs}px;background:${T.fg};color:${T.tx}"/></div><div style="display:flex;flex-wrap:wrap;gap:6px;justify-content:center;margin-bottom:24px"><button onclick="setState({catF:null})"style="padding:6px 14px;font-size:12px;font-weight:${!state.catF?700:500};font-family:${T.fs};border-radius:20px;background:${!state.catF?T.tx:'transparent'};color:${!state.catF?'white':T.tx2};border:1px solid ${!state.catF?T.tx:T.bd}">All</button>${DB.map(c=>`<button onclick="setState({catF:'${c.cat}'})"style="padding:6px 14px;font-size:12px;font-weight:${state.catF===c.cat?700:500};font-family:${T.fs};border-radius:20px;background:${state.catF===c.cat?T.tx:'transparent'};color:${state.catF===c.cat?'white':T.tx2};border:1px solid ${state.catF===c.cat?T.tx:T.bd}">${c.cat}</button>`).join('')}</div>${filtered.map(cat=>`<div style="margin-bottom:28px"><div style="display:flex;align-items:center;gap:8px;margin-bottom:12px"><span style="color:${T.acc}">${icons[cat.icon]?icons[cat.icon]():''}</span><h2 style="font-family:${T.ff};font-size:20px;font-weight:500;color:${T.tx}">${cat.cat}</h2><span style="font-size:11px;color:${T.txM};font-family:${T.fs}">${cat.subjects.length}</span></div><div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(min(100%,260px),1fr));gap:10px">${cat.subjects.map((s,i)=>SubjectCard(s,i*.04)).join('')}</div></div>`).join('')}</div>`;
}else if(state.view==='my'){
html+=`<div style="animation:fadeIn .3s ease"><div style="text-align:center;margin-bottom:20px"><h2 style="font-family:${T.ff};font-size:clamp(22px,3vw,30px);font-weight:400;color:${T.tx};margin-bottom:4px">My Academies</h2>${tL>0?`<p style="font-size:13px;color:${T.tx2};font-family:${T.fs}">${tD}/${tL} completed</p>`:''}</div>${state.acs.length>0?`<div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(min(100%,280px),1fr));gap:12px">${state.acs.map((a,i)=>{const dn=a.lessons.filter(l=>state.prog[l.id]).length,tot=a.lessons.length,st=dn===0?"not_started":dn===tot?"completed":"in_progress";return `<div onclick="setState({selAc:${i},view:'detail'})"style="background:${T.fg};border-radius:${T.r}px;padding:18px 20px;cursor:pointer;border:1px solid ${T.bd};box-shadow:${T.sh};animation:fadeIn .3s ease ${i*.05}s both"><div style="display:flex;justify-content:space-between;margin-bottom:6px"><span style="font-size:9px;font-weight:700;letter-spacing:1.5px;color:${T.txM};font-family:${T.fs}">${a.tag}</span>${Badge(st)}</div><h3 style="font-family:${T.ff};font-size:17px;font-weight:500;color:${T.tx};margin-bottom:3px">${a.title}</h3><p style="font-size:12px;color:${T.tx2};font-family:${T.fs};line-height:1.4;margin-bottom:10px">${a.description||a.desc}</p>${ProgressBar(dn,tot)}</div>`}).join('')}</div>`:`<div style="text-align:center;padding:40px 16px"><p style="font-size:14px;color:${T.txM};font-family:${T.fs};margin-bottom:12px">No academies yet.</p><button onclick="setState({view:'catalog'})"style="padding:11px 24px;font-size:14px;font-weight:600;font-family:${T.fs};color:white;background:${T.tx};border-radius:${T.rs}px">Browse Catalog</button></div>`}</div>`;
}else if(state.view==='detail'&&sel){
const done=sel.lessons.filter(l=>state.prog[l.id]).length;
html+=`<div style="animation:fadeIn .3s ease"><div style="display:flex;justify-content:space-between;margin-bottom:14px"><button onclick="setState({view:'my'})"style="display:inline-flex;align-items:center;gap:5px;font-size:13px;font-weight:500;color:${T.tx2};font-family:${T.fs}">${icons.back()} My Academies</button><button onclick="setState({delC:${state.selAc}})"style="display:inline-flex;align-items:center;gap:5px;font-size:11px;color:${T.txM};font-family:${T.fs};padding:5px 10px;border-radius:6px;border:1px solid ${T.bd}">${icons.trash(13)} Delete</button></div><div style="background:${T.fg};border-radius:14px;padding:22px 24px;border:1px solid ${T.bd};box-shadow:${T.sh}"><div style="margin-bottom:16px"><span style="font-size:9px;font-weight:700;letter-spacing:1.5px;color:${T.txM};font-family:${T.fs}">${sel.tag}</span><h2 style="font-family:${T.ff};font-size:clamp(20px,4vw,26px);font-weight:400;color:${T.tx};line-height:1.2;margin-top:4px">${sel.title}</h2><p style="font-size:13px;color:${T.tx2};font-family:${T.fs};margin-top:4px">${sel.description||sel.desc}</p>${sel.src?`<p style="font-size:11px;color:${T.txM};font-family:${T.fs};margin-top:6px">Source: ${sel.src} (${sel.lic})</p>`:''}<div style="margin-top:12px">${ProgressBar(done,sel.lessons.length)}</div></div><div style="display:flex;flex-direction:column;gap:2px">${sel.lessons.map((l,i)=>{const isDone=state.prog[l.id];return `<div style="display:flex;align-items:center;gap:8px;padding:12px;background:${T.fg2};border-radius:8px;border:1px solid ${T.bd}"><button onclick="toggle('${l.id}');if(!${isDone})addXp(50)"style="flex-shrink:0;width:20px;height:20px;border-radius:50%;border:2px solid ${isDone?T.acc:T.bd};background:${isDone?T.acc:'white'};display:flex;align-items:center;justify-content:center;color:white">${isDone?icons.check(12):''}</button><div style="flex:1;min-width:0"><div style="font-size:13px;font-weight:500;color:${T.tx};font-family:${T.fs};margin-bottom:2px">${i+1}. ${l.t}</div><div style="font-size:11px;color:${T.tx2};font-family:${T.fs}">${l.d}</div></div><button onclick="setState({selLi:${i},view:'lesson'})"style="padding:6px 12px;font-size:11px;font-weight:600;font-family:${T.fs};color:${T.acc};background:white;border:1px solid ${T.bd};border-radius:6px">Open</button></div>`}).join('')}</div></div></div>`;
}else if(state.view==='lesson'&&sel){
const les=sel.lessons[state.selLi];
const isDone=state.prog[les.id];
html+=`<div style="animation:fadeIn .3s ease"><button onclick="setState({view:'detail'})"style="display:inline-flex;align-items:center;gap:5px;font-size:13px;font-weight:500;color:${T.tx2};font-family:${T.fs};margin-bottom:16px">${icons.back()} Back to ${sel.title}</button><div style="background:${T.fg};border-radius:14px;padding:28px;border:1px solid ${T.bd};box-shadow:${T.sh}"><div style="margin-bottom:16px"><span style="font-size:10px;font-weight:700;letter-spacing:1.5px;color:${T.txM};font-family:${T.fs}">LESSON ${state.selLi+1} OF ${sel.lessons.length}</span><h2 style="font-family:${T.ff};font-size:clamp(22px,4vw,28px);font-weight:400;color:${T.tx};margin-top:4px;margin-bottom:8px">${les.t}</h2><p style="font-size:14px;color:${T.tx2};font-family:${T.fs};line-height:1.5">${les.d}</p></div><div style="padding:20px;background:${T.fg2};border-radius:10px;border:1px solid ${T.bd};margin-bottom:16px"><p style="font-size:13px;color:${T.tx2};font-family:${T.fs};line-height:1.6">This is a placeholder lesson view. In the full implementation, this would contain the actual lesson content from Open Educational Resources.</p></div><div style="display:flex;gap:10px;justify-content:space-between">${state.selLi>0?`<button onclick="setState({selLi:${state.selLi-1}})"style="padding:10px 20px;font-size:13px;font-weight:600;font-family:${T.fs};color:${T.tx2};background:white;border:1px solid ${T.bd};border-radius:${T.rs}px">Previous</button>`:'<div></div>'}<button onclick="toggle('${les.id}');if(!${isDone})addXp(50)"style="padding:10px 24px;font-size:13px;font-weight:600;font-family:${T.fs};color:white;background:${isDone?'#15803d':T.acc};border-radius:${T.rs}px">${isDone?icons.check(14)+' Completed':'Mark Complete'}</button>${state.selLi<sel.lessons.length-1?`<button onclick="setState({selLi:${state.selLi+1}})"style="padding:10px 20px;font-size:13px;font-weight:600;font-family:${T.fs};color:${T.tx2};background:white;border:1px solid ${T.bd};border-radius:${T.rs}px">Next</button>`:'<div></div>'}</div></div></div>`;
}

html+=`</main><footer style="text-align:center;padding:14px 20px 28px"><p style="font-size:11px;color:${T.txM};font-family:${T.fs}">HZL Academy - Built by Ryann Murphy. Powered by Open Educational Resources.</p></footer></div>`;

document.getElementById('app').innerHTML=html;

const searchInput=document.getElementById('searchInput');
if(searchInput){searchInput.addEventListener('input',e=>setState({search:e.target.value}))}
}

window.setState=setState;
window.addXp=addXp;
window.toggle=toggle;
window.delAc=delAc;
window.enrollSubject=function(subj){enroll(subj)};

render();
</script>
</body>
</html>
