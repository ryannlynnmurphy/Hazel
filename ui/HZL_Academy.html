<!DOCTYPE html>

<link href="https://fonts.googleapis.com/css2?family=Newsreader:opsz,wght@6..72,400;6..72,500;6..72,600&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<body>
<div id="app">Loading…</div>
<script>
/**
 * Scatter OS Guide — teaches what each part of the local assistant does.
 * No XP, no minigames, no external K–12 catalog: just computer literacy for
 * the modules you enable on this machine.
 */
const T={bg:"#F5F2EB",fg:"#FFF",fg2:"#EDEAE3",bd:"#DDD9D0",bdL:"#EBE8E1",tx:"#1A1714",tx2:"#6B6560",txM:"#A09A92",acc:"#8B5E3C",ff:"'Newsreader',Georgia,serif",fs:"'Outfit',system-ui,sans-serif",r:12,rs:8,sh:"0 1px 3px rgba(0,0,0,.04)"};

const CATEGORIES = [
{ id:"foundations", name:"Foundations", icon:"cpu", blurb:"How speech, models, and memory fit together on your Pi or PC." },
{ id:"data", name:"Your accounts", icon:"mail", blurb:"What happens when you connect email, calendar, and cloud APIs." },
{ id:"home", name:"Home & media", icon:"home", blurb:"Lights, music, and devices — what “control” really means." },
{ id:"info", name:"News & world", icon:"glob", blurb:"Where headlines and weather data come from." },
{ id:"work", name:"Tasks & sync", icon:"check", blurb:"Lists, nudges, and lightweight integrations." },
{ id:"dev", name:"Code & builder", icon:"code", blurb:"GitHub, snippets, and how the web UI talks to Python." },
];

const MODULES = [
{ id:"flow",cat:"foundations",title:"From voice to action",tag:"STACK",desc:"The path your words take before anything happens on disk or on the network.",
lessons:[
{t:"Intent, not magic",body:"When you speak or type, nothing “just knows” what you want. A speech model turns audio into text, then a language model turns text into a plan: natural language in, structured instructions out. Learning that path is the core of computer literacy with agents."},
{t:"Why local first matters",body:"On Scatter/Hazel, the goal is to keep inference and personal state on hardware you own when possible. Cloud models may still handle some tasks, but the design makes it obvious what is local (Whisper, SQLite, Piper) and what is not."},
{t:"Actions vs chat",body:"The assistant often appends machine-readable tags to responses — calendar refreshes, smart-home commands, and so on. Those tags are for other programs, not for you to hear aloud. Separating “what Hazel says” from “what the OS does” is how you stay in control."}]},
{ id:"stt",cat:"foundations",title:"Speech to text (Whisper)",tag:"STT",desc:"On-device listening: what runs where, and what never leaves the machine.",
lessons:[
{t:"What Whisper is doing",body:"Whisper is a neural model that maps audio waveforms to text. It runs locally on the Pi, so your raw voice is not sent to a speech API unless you have explicitly set up a different path."},
{t:"Microphone trust",body:"If the device can hear you, it can in principle record you. The honest constraint is: you know the code path, you can unplug the mic, and you can read logs. That is the same threat model as any voice assistant, but with open components."},
{t:"Accuracy tradeoffs",body:"On-device STT is slightly less polished than some cloud services, but the latency and privacy win matter in classrooms and shared machines. Worse accuracy is a teaching moment: models guess."}]},
{ id:"tts",cat:"foundations",title:"Text to speech",tag:"TTS",desc:"ElevenLabs, Piper, and when the machine speaks without the cloud.",
lessons:[
{t:"Primary vs fallback",body:"If ElevenLabs (or another cloud voice) is configured, you get high-quality speech that leaves your network. Piper is a local neural voice that never phones home — lower fidelity, full sovereignty."},
{t:"What gets spoken",body:"The system strips action tags and internal instructions before TTS. If something sounds wrong, it is often because the model wrote content meant for a screen, not a speaker."},
{t:"Choosing voices in schools",body:"A district deployment might lock Piper only. Teaching kids which stack is in use (check settings or env) is part of media literacy."}]},
{ id:"mem",cat:"foundations",title:"SQLite memory",tag:"DB",desc:"Facts, chat history, reminders, and health logs — all plain files you can inspect.",
lessons:[
{t:"Why a database in the home",body:"SQLite is a single file on disk. Your memories are rows in tables, not someone else’s product analytics. Backups are copying a file. That is the “sovereignty” story in concrete terms."},
{t:"What is stored",body:"Conversations, extracted facts, reminders, and health entries are typical. Each feature module appends to the same idea: state you can delete, port, or audit."},
{t:"Limits",body:"If someone has shell access to the device, they can read or modify the file. The threat model is honest: local first does not mean nation-state proof — it means you are not paying with silent cloud retention."}]},
{ id:"gcal",cat:"data",title:"Google Calendar",tag:"CAL",desc:"OAuth, scopes, and what “check my day” really triggers.",
lessons:[
{t:"OAuth in plain terms",body:"You log in to Google in a browser once, and the assistant stores a token that says “this app can read (or write) calendar data until revoked.” The Pi never sees your Google password on every request — it exchanges the token."},
{t:"Read vs write",body:"Read-only is safer for classrooms. If the assistant can add events, a confused model could in theory add junk events — that is why confirmations matter for sensitive writes."},
{t:"What appears in the UI",body:"The web dashboard fetches upcoming events to paint panels. The same data can be read aloud. One source, two surfaces: voice and screen."}]},
{ id:"gmail",cat:"data",title:"Gmail",tag:"MAIL",desc:"IMAP/HTTP APIs: reading inboxes and sending with confirmation.",
lessons:[
{t:"The Gmail API",body:"Email is not scraped through a password field on each request. The app uses Google’s API with the scopes you approved — search, read thread, or send — each scope is a permission you can review in Google Account settings."},
{t:"Send confirmation",body:"Good design never sends mail silently from vague prompts. If your build asks before send, that is a safety and consent layer students should see named explicitly."},
{t:"Mail vs training",body:"With Anthropic, your mail content is processed under their API terms for that call — it is not the same as “Google trains on my inbox.” Teach the difference between an API call and a product learning from your data."}]},
{ id:"hass",cat:"home",title:"Home Assistant",tag:"IOT",desc:"REST control of lights, switches, and more — a local hub vs cloud gadgets.",
lessons:[
{t:"Why a hub",body:"Home Assistant is often a small server on your LAN. The assistant issues HTTP calls like “turn on light.living_room” that HA translates to real devices. The Pi does not talk Zigbee or Z-Wave directly unless HA does."},
{t:"Action tags",body:"[ACTION: ...] style tags map to home automation. They are a contract between the model’s plan and a Python function. Tracing a tag to a function call is a perfect lesson in composable systems."},
{t:"Failure modes",body:"If HA is down, the assistant can lie confidently about the state of a room. Teaching “verify on the wall switch” is valid engineering hygiene."}]},
{ id:"spot",cat:"home",title:"Spotify",tag:"MUSIC",desc:"Playback control, queues, and what a music API can and cannot do.",
lessons:[
{t:"Control plane",body:"Spotify’s Web API lets you find tracks, start playback, and adjust volume for linked devices. The assistant is a remote; it is not “uploading your taste” in a different way than the official app, but tokens still deserve rotation if leaked."},
{t:"Device pickers",body:"If playback targets a specific speaker, the user should know which `device_id` is active. Mismatch is a common bug — good fodder for debugging lessons."},
{t:"Scope of creativity",body:"The music integration does not make new audio; it routes intent. Distinguish “AI composed music” from “AI pressed play,” which is the literacy point."}]},
{ id:"wx",cat:"info",title:"Weather",tag:"WX",desc:"Open-Meteo and other free services — no key, still a network call.",
lessons:[
{t:"Keyless APIs",body:"Open-Meteo does not need an API key, but your Pi still fetches from their servers. “No key” is not the same as “air gapped” — you are still trusting their responses."},
{t:"Caching and rate limits",body:"Respectful clients cache forecasts. If every voice wake refreshed weather, you would thrash a public service. Batching and intervals are part of good citizenship on the web."},
{t:"Precision vs place",body:"Forecasts are model outputs with uncertainty. The assistant should not sound more certain than a meteorology student would, especially for severe weather: link to official alerts when needed."}]},
{ id:"news",cat:"info",title:"News & search",tag:"NEWS",desc:"Tavily, headlines, and injecting fresh web context into a chat.",
lessons:[
{t:"Retrieval vs memory",body:"Web search results are not stored in your long-term memory by default. They are retrieved for this answer. The distinction is everything when a student thinks “it read the internet and learned it forever.”"},
{t:"Bias and time",body:"Headline APIs rank stories. Ranks are editorial even when sources look neutral. Teaching ranking literacy beats pretending results are “raw truth.”"},
{t:"Cost",body:"Search APIs cost money or quota. A classroom deployment may disable them. Saying that out loud is financial literacy for APIs."}]},
{ id:"tdo",cat:"work",title:"Tasks, list, and nudges",tag:"EXT",desc:"Todoist, shopping, and phone notifications — small APIs, clear boundaries.",
lessons:[
{t:"One app, many tools",body:"`integrations.py` exists so optional modules can fail import without taking down the rest. That is how you scale surface area without a monolith: load what is installed."},
{t:"Notify responsibly",body:"Pushing a phone alert is interrupting a human. Tying ntfy or similar to explicit user requests keeps trust — same lesson as school bell policy."},
{t:"Shopping lists are data",body:"A shared list is a tiny database. Who can add or clear is a permissions question, not a toy feature."}]},
{ id:"gh",cat:"dev",title:"GitHub",tag:"DEV",desc:"Listing repos, reading commits, and push flows — what “AI pair programmer” can touch.",
lessons:[
{t:"Tokens, again",body:"A GitHub personal access token is a password for automation. Storing it in an env var on the device is better than in chat logs. Rotating on leak is a drill students should do once."},
{t:"Read before write",body:"Listing and reading is lower risk than push. Any workflow that can modify main should require human confirmation, especially in a school lab with shared org repos."},
{t:"What the model does not do",body:"The assistant navigates the API; it does not automatically understand your team’s code review culture. Framing: tools, not employees."}]},
{ id:"code",cat:"dev",title:"Code runner",tag:"REPL",desc:"Why running Python on voice is powerful and dangerous.",
lessons:[
{t:"Arbitrary code",body:"`exec` on demand is a superpower: homework automation, one-off math, and also footguns. A locked-down school image should run snippets in a sandbox or disable the feature — teach why."},
{t:"Output vs effect",body:"Distinguish printing a result from mutating a file, network, or device. The literacy goal is to map side effects, not to celebrate clever hacks."},
{t:"Logging",body:"The launcher and logs exist so an adult can see what ran. That is accountability for any classroom deployment."}]},
{ id:"ws",cat:"dev",title:"This web UI",tag:"UI",desc:"Websockets, port 8082, and how panels get live data.",
lessons:[
{t:"Not a website in the cloud",body:"`python3 -m http.server` only serves static files. The chat and panels use a WebSocket to `main.py` / `hzl_ws.py` so the browser can get streaming state without polling."},
{t:"Message types",body:"`calendar_state`, `music_state`, and similar messages are a contract. Open `hzl_ws.py` and read the `broadcast` payload shapes — that is the map from backend to UI."},
{t:"Why this matters in class",body:"When students add a feature, they touch both a Python module and, sometimes, a JSON message. That is full-stack thinking without shipping to AWS on day one."}]},
];

const LS_KEY = "scatter_os_guide_read";
function readIds(){ try{ return new Set(JSON.parse(localStorage.getItem(LS_KEY)||"[]")); } catch(e){ return new Set(); } }
function markRead(lid, on){
  const s = readIds();
  if(on) s.add(lid); else s.delete(lid);
  localStorage.setItem(LS_KEY, JSON.stringify([...s]));
}

const icons = {
  cpu:()=>`<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><rect x="4" y="4" width="16" height="16" rx="2"/><rect x="9" y="9" width="6" height="6"/><line x1="9" y1="1" x2="9" y2="4"/><line x1="15" y1="1" x2="15" y2="4"/><line x1="9" y1="20" x2="9" y2="23"/><line x1="15" y1="20" x2="15" y2="23"/><line x1="20" y1="9" x2="23" y2="9"/><line x1="20" y1="15" x2="23" y2="15"/><line x1="1" y1="9" x2="4" y2="9"/><line x1="1" y1="15" x2="4" y2="15"/></svg>`,
  mail:()=>`<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>`,
  home:()=>`<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>`,
  globe:()=>`<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><circle cx="12" cy="12" r="10"/><line x1="2" y1="12" x2="22" y2="12"/><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/></svg>`,
  check:()=>`<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><polyline points="20 6 9 17 4 12"/></svg>`,
  code:()=>`<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><polyline points="16 18 22 12 16 6"/><polyline points="8 6 2 12 8 18"/></svg>`,
  back:(s=16)=>`<svg width="${s}" height="${s}" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 12H5"/><path d="M12 19l-7-7 7-7"/></svg>`,
  search:(s=16)=>`<svg width="${s}" height="${s}" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>`,
  chk:(s=13)=>`<svg width="${s}" height="${s}" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><polyline points="20 6 9 17 4 12"/></svg>`,
};

let state = { view: "home", search: "", cat: null, mid: null, li: 0, _read: readIds() };

function setState(u){ state = { ...state, ...u, _read: readIds() }; render(); }
function lessonId(m, i){ return `${m.id}_${i}`; }

function modFiltered(){
  return MODULES.filter(m => {
    if (state.cat && m.cat !== state.cat) return false;
    if (!state.search) return true;
    const q = state.search.toLowerCase();
    return m.title.toLowerCase().includes(q) || m.desc.toLowerCase().includes(q) || m.tag.toLowerCase().includes(q);
  });
}

function render(){
  const read = readIds();
  const totalL = MODULES.reduce((a,m)=>a+m.lessons.length,0);
  const doneL = MODULES.reduce((a,m)=>a+m.lessons.filter((_,i)=>read.has(lessonId(m,i))).length,0);

  let html = `<div style="min-height:100vh;background:${T.bg}"><header style="position:sticky;top:0;z-index:50;background:#F5F2EBE6;backdrop-filter:blur(8px);border-bottom:1px solid ${T.bdL};padding:0 20px"><div style="max-width:800px;margin:0 auto;min-height:56px;display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap"><div><h1 onclick="setState({view:'home',cat:null,mid:null})" style="font-family:${T.ff};font-size:20px;font-weight:500;cursor:pointer;color:${T.tx}">Scatter OS</h1><p style="font-size:11px;color:${T.txM};margin-top:2px">Learn what each part of your assistant does</p></div><div style="font-size:12px;color:${T.tx2}">${doneL}/${totalL} sections read</div></div></header><main style="max-width:800px;margin:0 auto;padding:24px 20px 48px">`;

  if (state.view === "lesson" && state.mid != null) {
    const m = MODULES[state.mid];
    if (!m) { setState({ view: "module", mid: null }); return; }
    const les = m.lessons[state.li];
    const lid = lessonId(m, state.li);
    const isRead = read.has(lid);
    html += `<button onclick="setState({view:'module'})" style="display:inline-flex;align-items:center;gap:6px;font-size:13px;color:${T.tx2};font-family:${T.fs};margin-bottom:18px;background:none;border:none;cursor:pointer">${icons.back()} ${m.title}</button>`;
    html += `<article style="background:${T.fg};border:1px solid ${T.bd};border-radius:14px;padding:28px;box-shadow:${T.sh}">`;
    html += `<p style="font-size:10px;letter-spacing:1.2px;font-weight:700;color:${T.txM}">${(CATEGORIES.find(c=>c.id===m.cat)||{}).name||m.cat} · ${m.tag}</p>`;
    html += `<h2 style="font-family:${T.ff};font-size:28px;font-weight:400;margin:8px 0 16px;color:${T.tx}">${les.t}</h2>`;
    html += `<div style="font-size:15px;line-height:1.65;color:${T.tx2};font-family:${T.fs}">`;
    les.body.split("\n\n").forEach(p => { html += `<p style="margin-bottom:14px">${escapeHtml(p)}</p>`; });
    html += `</div>`;
    html += `<div style="margin-top:24px;padding-top:20px;border-top:1px solid ${T.bd};display:flex;flex-wrap:wrap;gap:10px;align-items:center;justify-content:space-between">`;
    html += `<label style="display:flex;align-items:center;gap:8px;cursor:pointer;font-size:14px;font-family:${T.fs};color:${T.tx}"><input type="checkbox" ${isRead?"checked":""} onchange="markRead('${lid}',this.checked);setState({})" style="width:18px;height:18px;accent-color:${T.acc}"/> Mark as read</label>`;
    html += `<div style="display:flex;gap:8px">`;
    if (state.li > 0) html += `<button onclick="setState({li:${state.li-1}})" style="padding:10px 16px;font-size:13px;border:1px solid ${T.bd};border-radius:${T.rs}px;background:white;font-family:${T.fs};color:${T.tx2}">Previous</button>`;
    if (state.li < m.lessons.length - 1) html += `<button onclick="setState({li:${state.li+1}})" style="padding:10px 16px;font-size:13px;border:1px solid ${T.bd};border-radius:${T.rs}px;background:${T.tx};color:white;font-family:${T.fs}">Next</button>`;
    html += `</div></div></article>`;
  } else if (state.view === "module" && state.mid != null) {
    const m = MODULES[state.mid];
    if (!m) { setState({ view: "home", mid: null }); return; }
    const cat = CATEGORIES.find(c => c.id === m.cat);
    html += `<button onclick="setState({view:'home',cat:'${m.cat}'})" style="display:inline-flex;align-items:center;gap:6px;font-size:13px;color:${T.tx2};margin-bottom:16px;background:none;border:none;cursor:pointer;font-family:${T.fs}">${icons.back()} ${cat?cat.name:'Modules'}</button>`;
    html += `<div style="margin-bottom:20px"><span style="font-size:10px;font-weight:700;letter-spacing:1.2px;color:${T.txM}">${m.tag}</span><h2 style="font-family:${T.ff};font-size:26px;font-weight:400;margin:6px 0 8px;color:${T.tx}">${m.title}</h2><p style="font-size:14px;color:${T.tx2};line-height:1.5;font-family:${T.fs}">${m.desc}</p></div>`;
    m.lessons.forEach((L,i) => {
      const lid = lessonId(m,i);
      const done = read.has(lid);
      html += `<div style="display:flex;align-items:flex-start;gap:12px;padding:14px 16px;background:${T.fg2};border:1px solid ${T.bd};border-radius:10px;margin-bottom:8px">`;
      html += `<span style="margin-top:2px;color:${done?T.acc:T.txM}">${done?icons.chk(14):'○'}</span>`;
      html += `<div style="flex:1;min-width:0"><div style="font-size:15px;font-weight:500;color:${T.tx};font-family:${T.fs}">${i+1}. ${escapeHtml(L.t)}</div>`;
      html += `<button onclick="setState({view:'lesson',li:${i}})" style="margin-top:8px;padding:6px 12px;font-size:12px;font-weight:600;border:1px solid ${T.bd};border-radius:6px;background:white;color:${T.acc};font-family:${T.fs}">Read</button></div></div>`;
    });
  } else {
    /* home: filter chips + list */
    html += `<p style="font-size:15px;color:${T.tx2};line-height:1.55;font-family:${T.fs};margin-bottom:12px">This guide tracks <strong>Scatter / Hazel</strong> itself — the programs you add to the device, the tokens you approve, and the path from speech to action. It replaces the old subject catalog and game-style progress with plain reading and checkboxes.</p>`;
    html += `<p style="font-size:14px;color:${T.tx2};line-height:1.5;font-family:${T.fs};margin-bottom:20px">Praxis: <a href="classroom.html" style="color:${T.acc};font-weight:600">Local single-player “Kahoot”</a> — same confabulatory frame as <code>scatter-system/docs/CONFABULATORY_PHILOSOPHY.md</code> (on-machine estimates ~, local topology, time held for understanding).</p>`;
    html += `<div style="position:relative;margin-bottom:20px"><span style="position:absolute;left:12px;top:50%;transform:translateY(-50%);color:${T.txM}">${icons.search()}</span><input value="${escapeAttr(state.search)}" placeholder="Filter modules…" oninput="setState({search:this.value})" style="width:100%;padding:12px 14px 12px 40px;font-size:14px;border:1.5px solid ${T.bd};border-radius:8px;background:${T.fg};color:${T.tx};font-family:${T.fs}"/></div>`;
    html += `<div style="display:flex;flex-wrap:wrap;gap:8px;margin-bottom:24px">`;
    html += `<button onclick="setState({cat:null})" style="padding:8px 14px;font-size:12px;border-radius:20px;border:1px solid ${T.bd};font-family:${T.fs};background:${!state.cat?T.tx:'white'};color:${!state.cat?'#fff':T.tx2}">All</button>`;
    CATEGORIES.forEach(c => {
      html += `<button onclick="setState({cat:'${c.id}'})" style="padding:8px 14px;font-size:12px;border-radius:20px;border:1px solid ${T.bd};font-family:${T.fs};background:${state.cat===c.id?T.tx:'white'};color:${state.cat===c.id?'#fff':T.tx2}">${c.name}</button>`;
    });
    html += `</div>`;
    const groups = {};
    CATEGORIES.forEach(c=>{groups[c.id]=[]});
    modFiltered().forEach(m=>{if(!groups[m.cat]) groups[m.cat]=[]; groups[m.cat].push(m);});
    const order = CATEGORIES.map(c=>c.id);
    order.forEach(cid => {
      const list = (state.cat ? (state.cat===cid?groups[cid]:[]) : groups[cid]).filter(x=>x);
      if (!list.length) return;
      const c = CATEGORIES.find(x=>x.id===cid);
      html += `<section style="margin-bottom:28px"><div style="display:flex;align-items:center;gap:8px;margin-bottom:12px"><span style="color:${T.acc}">${icons[c.icon]?icons[c.icon]():''}</span><h2 style="font-family:${T.ff};font-size:20px;font-weight:500;color:${T.tx}">${c.name}</h2></div><p style="font-size:12px;color:${T.txM};margin:-6px 0 12px 0;font-family:${T.fs}">${c.blurb}</p>`;
      html += `<div style="display:grid;gap:10px">${list.map((m,idx)=>{ const mid=MODULES.indexOf(m); const pr = m.lessons.filter((_,i)=>read.has(lessonId(m,i))).length; return `<div onclick="setState({view:'module',mid:${mid}})" style="background:${T.fg};border:1px solid ${T.bd};border-radius:12px;padding:16px 18px;cursor:pointer;box-shadow:${T.sh};animation:fadeIn .25s ease ${idx*.03}s both"><div style="display:flex;justify-content:space-between;gap:8px;align-items:flex-start"><div><span style="font-size:9px;font-weight:700;letter-spacing:1.2px;color:${T.txM}">${m.tag}</span><h3 style="font-family:${T.ff};font-size:17px;font-weight:500;margin-top:4px;color:${T.tx}">${m.title}</h3><p style="font-size:12px;color:${T.tx2};line-height:1.4;margin-top:6px;font-family:${T.fs}">${m.desc}</p></div><span style="font-size:11px;color:${T.txM};white-space:nowrap">${pr}/${m.lessons.length}</span></div></div>`; }).join('')}</div></section>`;
    });
  }

  html += `</main><footer style="text-align:center;padding:8px 20px 32px"><p style="font-size:11px;color:${T.txM};font-family:${T.fs}">Local-only guide — no account, no catalog sync. Clear progress: localStorage key <code style="font-size:10px">scatter_os_guide_read</code></p></footer></div>`;
  document.getElementById("app").innerHTML = html;
}
function escapeHtml(s){
  return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
}
function escapeAttr(s){ return escapeHtml(s).replace(/'/g,"&#39;"); }

window.setState = setState;
window.markRead = markRead;
render();
</script>
</body>
</html>
